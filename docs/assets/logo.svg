  <line x1="88" y1="78" x2="72" y2="50" stroke="#0a0a0a" stroke-width="4.5" stroke-linecap="round"/>
  <circle cx="72" cy="50" r="4" fill="#0a0a0a"/>
  <!-- Right antenna -->
