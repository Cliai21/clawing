  <!-- Head: rounded square -->
  <rect x="72" y="78" width="56" height="56" rx="16" fill="#0a0a0a"/>
  <!-- Eyes -->
  <circle cx="88" cy="102" r="6" fill="#CDFF50"/>
  <circle cx="112" cy="102" r="6" fill="#CDFF50"/>
